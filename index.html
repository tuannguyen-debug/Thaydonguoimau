<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Fashion Editor — Thay Đồ Người Mẫu</title>
  <meta name="description" content="AI Fashion Editor - Tải lên ảnh người mẫu và trang phục mới, AI sẽ tạo ảnh thay đồ chất lượng cao bằng Gemini API" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-gradient"></div>
  <div class="bg-grid"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="header" id="header">
      <div class="header-brand">
        <div class="logo">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="40" height="40" rx="12" fill="url(#logo-gradient)"/>
            <path d="M12 28V12h4l4 10 4-10h4v16h-3V17l-4 11h-2l-4-11v11h-3z" fill="#fff"/>
            <defs><linearGradient id="logo-gradient" x1="0" y1="0" x2="40" y2="40"><stop stop-color="#a855f7"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs>
          </svg>
        </div>
        <div>
          <h1 class="header-title">AI Fashion Editor</h1>
          <p class="header-subtitle">Thay đồ người mẫu bằng AI</p>
        </div>
      </div>

      <button class="settings-toggle" id="settings-toggle" aria-label="Settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settings-panel">
      <div class="settings-inner">
        <div class="setting-group">
          <label for="api-key-input" class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
            Gemini API Key
          </label>
          <div class="api-key-wrapper">
            <input type="password" id="api-key-input" placeholder="Nhập API Key của bạn..." autocomplete="off" />
            <button class="api-key-toggle" id="api-key-toggle" aria-label="Toggle visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="setting-group">
          <label for="model-select" class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            Model AI
          </label>
          <select id="model-select">
            <option value="gemini-3-pro-image-preview">Nano Banana Pro (gemini-3-pro-image-preview)</option>
            <option value="gemini-3.1-flash-image-preview">Nano Banana 2 (gemini-3.1-flash-image-preview)</option>
            <option value="gemini-2.5-flash-image">Nano Banana (gemini-2.5-flash-image)</option>
          </select>
        </div>
        <div class="setting-group">
          <label for="quality-select" class="setting-label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M7 8h4m-2-2v4m5-1h4"/><path d="M7 16h10"/></svg>
            Chất Lượng Ảnh
          </label>
          <select id="quality-select">
            <option value="1K">1K (1024px)</option>
            <option value="2K" selected>2K (2048px)</option>
            <option value="4K">4K (4096px)</option>
            <option value="8K">8K (8192px)</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Upload Section -->
    <section class="upload-section" id="upload-section">
      <div class="upload-card" id="model-upload">
        <div class="upload-zone" id="model-drop-zone">
          <input type="file" id="model-file-input" accept="image/*" hidden />
          <div class="upload-placeholder" id="model-placeholder">
            <div class="upload-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <h3>Ảnh Người Mẫu</h3>
            <p>Kéo thả hoặc click để tải lên</p>
            <span class="upload-hint">JPG, PNG, WebP</span>
          </div>
          <div class="upload-preview" id="model-preview" style="display:none;">
            <img id="model-preview-img" alt="Model preview" />
            <button class="remove-btn" id="model-remove" aria-label="Remove">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="upload-connector">
        <div class="connector-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </div>
      </div>

      <div class="upload-card" id="clothing-upload">
        <div class="upload-zone" id="clothing-drop-zone">
          <input type="file" id="clothing-file-input" accept="image/*" hidden />
          <div class="upload-placeholder" id="clothing-placeholder">
            <div class="upload-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M20.38 3.46L16 2 12 5 8 2 3.62 3.46a2 2 0 0 0-1.34 1.89v14.3a2 2 0 0 0 2 2h15.44a2 2 0 0 0 2-2V5.35a2 2 0 0 0-1.34-1.89z"/>
                <path d="M8 2v9l4-3 4 3V2"/>
              </svg>
            </div>
            <h3>Ảnh Trang Phục</h3>
            <p>Kéo thả hoặc click để tải lên</p>
            <span class="upload-hint">JPG, PNG, WebP</span>
          </div>
          <div class="upload-preview" id="clothing-preview" style="display:none;">
            <img id="clothing-preview-img" alt="Clothing preview" />
            <button class="remove-btn" id="clothing-remove" aria-label="Remove">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Mode Selector -->
    <section class="mode-section" id="mode-section">
      <h2 class="section-title">Chọn Chế Độ</h2>
      <div class="mode-buttons">
        <button class="mode-btn active" data-mode="1" id="mode-btn-1">
          <div class="mode-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20.38 3.46L16 2 12 5 8 2 3.62 3.46a1 1 0 0 0-.62.92V11h18V4.38a1 1 0 0 0-.62-.92z"/>
            </svg>
          </div>
          <span class="mode-label">Thay Áo</span>
          <span class="mode-desc">Chỉ thay phần áo</span>
        </button>

        <button class="mode-btn" data-mode="2" id="mode-btn-2">
          <div class="mode-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="5" y="11" width="14" height="11" rx="2"/>
              <line x1="8" y1="22" x2="8" y2="16"/>
              <line x1="16" y1="22" x2="16" y2="16"/>
            </svg>
          </div>
          <span class="mode-label">Thay Quần/Váy</span>
          <span class="mode-desc">Chỉ thay phần dưới</span>
        </button>

        <button class="mode-btn" data-mode="3" id="mode-btn-3">
          <div class="mode-icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M20.38 3.46L16 2 12 5 8 2 3.62 3.46a1 1 0 0 0-.62.92V20a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V4.38a1 1 0 0 0-.62-.92z"/>
              <line x1="8" y1="22" x2="8" y2="16"/>
              <line x1="16" y1="22" x2="16" y2="16"/>
            </svg>
          </div>
          <span class="mode-label">Thay Cả Bộ</span>
          <span class="mode-desc">Thay toàn bộ trang phục</span>
        </button>
      </div>
    </section>

    <!-- Generate Button -->
    <section class="generate-section">
      <button class="generate-btn" id="generate-btn">
        <span class="generate-btn-text">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          Tạo Ảnh Mới
        </span>
        <span class="generate-btn-loading" style="display:none;">
          <div class="spinner"></div>
          Đang xử lý...
        </span>
      </button>
    </section>

    <!-- Error Message -->
    <div class="error-message" id="error-message" style="display:none;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span id="error-text"></span>
    </div>

    <!-- Result Section -->
    <section class="result-section" id="result-section" style="display:none;">
      <h2 class="section-title">Kết Quả</h2>
      <div class="result-card">
        <div class="result-comparison">
          <div class="result-original">
            <span class="result-label">Ảnh gốc</span>
            <img id="result-original-img" alt="Original" class="lightbox-trigger" title="Click để xem toàn màn hình" />
          </div>
          <div class="result-arrow">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </div>
          <div class="result-output">
            <span class="result-label">Kết quả AI</span>
            <img id="result-output-img" alt="AI result" class="lightbox-trigger" title="Click để xem toàn màn hình" />
          </div>
        </div>
        <div class="result-actions">
          <button class="download-btn" id="download-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Tải Xuống
          </button>
          <button class="retry-btn" id="retry-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Thử Lại
          </button>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Powered by <strong>Google Gemini API</strong> — Nano Banana Pro</p>
    </footer>
  </div>

  <!-- Lightbox Overlay -->
  <div class="lightbox-overlay" id="lightbox-overlay">
    <div class="lightbox-header">
      <span class="lightbox-title" id="lightbox-title">Xem ảnh</span>
      <div class="lightbox-actions">
        <button class="lightbox-download" id="lightbox-download" title="Tải xuống">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
        <button class="lightbox-close" id="lightbox-close" title="Đóng (ESC)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <div class="lightbox-body">
      <img id="lightbox-img" alt="Fullscreen view" />
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
